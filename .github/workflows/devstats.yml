name: Update CNCF DevStats score

on:
  schedule:
    # Daily at 22:17 UTC = 06:17 Taiwan time (UTC+8); odd minute avoids the top-of-hour scheduler backlog.
    - cron: '17 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: devstats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the push-retry rebase works

      - name: Refresh DevStats score in README
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Query the official CNCF DevStats API (same call the devstats-viewer makes).
          new=$(curl -sf --retry 3 --retry-delay 5 -m 30 \
            -X POST https://devstats.cncf.io/api/v1 \
            -H 'Content-Type: application/json' \
            -d '{"api":"GithubIDContributions","payload":{"github_id":"thc1006"}}' \
            | jq -r '.contributions')

          # Fail closed: only ever write a clean positive integer.
          case "$new" in
            ''|*[!0-9]*) echo "::error::unexpected DevStats value: '$new'"; exit 1 ;;
          esac
          [ "$new" -gt 0 ] || { echo "::error::non-positive DevStats score"; exit 1; }

          fmt=$(python3 -c "print(f'{$new:,}')")
          cur=$(grep -oE '\[\*\*[0-9,]+\*\*\]\(https://devstats\.cluster\.fun' README.md \
                | grep -oE '[0-9,]+' | head -1 || true)

          # Format-drift guard: if the number vanished from README, fail loudly
          # instead of silently attempting an empty commit.
          if [ -z "$cur" ]; then
            echo "::error::could not locate the DevStats number in README (format changed?)"; exit 1
          fi

          if [ "$fmt" = "$cur" ]; then
            echo "DevStats unchanged ($cur) -- nothing to do."; exit 0
          fi

          # Sanity guard: DevStats is ~monotonic. A >20% drop is almost always a
          # transient API recompute glitch, not a real change -- skip it.
          curn=${cur//,/}
          if [ "$new" -lt "$(( curn * 80 / 100 ))" ]; then
            echo "::warning::DevStats dropped $cur -> $fmt (>20%); treating as API glitch, skipping."; exit 0
          fi

          echo "DevStats $cur -> $fmt"
          sed -i -E "s#\[\*\*[0-9,]+\*\*\]\(https://devstats\.cluster\.fun#[**${fmt}**](https://devstats.cluster.fun#g" README.md

          # Only commit if the file actually changed.
          if git diff --quiet -- README.md; then
            echo "README unchanged after edit -- nothing to commit."; exit 0
          fi

          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m "chore: refresh CNCF DevStats score to ${fmt}" -- README.md

          # Handle a manual push landing between checkout and push.
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push failed (attempt $attempt); rebasing onto latest ${BRANCH}..."
            git pull --rebase origin "$BRANCH"
          done
          echo "::error::git push failed after 3 attempts"; exit 1
